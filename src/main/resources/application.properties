spring.application.name=coderfolio

# ----- DB 접속 정보 (콘솔 앱의 Database.java 역할을 여기서 대신함) -----
# ${환경변수이름:기본값} 문법: 환경변수가 있으면 그 값을, 없으면 기본값을 씀.
# 로컬 개발 땐 기본값(localhost:3306/login_app)이 그대로 쓰이고,
# Railway 같은 배포 환경에서는 DB_HOST/DB_PORT/DB_NAME 환경변수로 실제 주소를 덮어씀.
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:login_app}
# 비밀번호는 기본값 없이 ${DB_PASSWORD} — 환경변수가 없으면 서버가 아예 안 뜨게 해서
# "실수로 비밀번호 없이 배포"되는 사고를 시작 시점에 바로 알아차리게 함.
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

# JPA/Hibernate를 안 쓰기로 했으므로(JdbcTemplate 직접 사용), spring.jpa.* 설정은 필요 없어짐.
# 대신 SQL 실행 로그를 보고 싶으면 아래 설정으로 확인 가능:
logging.level.org.springframework.jdbc.core=DEBUG

# ----- schema.sql 자동 실행 설정 -----
# 기본값은 "내장 DB(H2 등)일 때만 실행"이라, MySQL처럼 외부 DB를 쓸 땐 always로 켜줘야 함.
spring.sql.init.mode=always
# 기본 위치(resources 바로 밑)가 아니라 sql/ 폴더로 옮겼으니, 위치를 직접 알려줌.
# (나중에 data.sql 등을 추가하면 spring.sql.init.data-locations도 같은 식으로 추가)
spring.sql.init.schema-locations=classpath:sql/schema.sql
# schema.sql의 ALTER TABLE(기존 테이블에 컬럼 추가)이 두 번째 실행부터 "이미 있음" 에러를 내는데,
# 그때 서버가 죽지 않고 넘어가게 함. (스키마 변경이 많아지면 Flyway로 교체하는 게 정석)
spring.sql.init.continue-on-error=true

