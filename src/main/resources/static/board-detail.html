<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>게시글</title>
    <link rel="stylesheet" href="/css/app.css">
    <script src="/js/app.js"></script>
</head>
<body>

<!-- 상단 네비게이션 바: 실제 내용은 app.js의 renderTopbar()가 채워 넣음 -->
<header class="topbar" id="topbar" data-active="board"></header>

<div class="page" id="post">
    <!-- JS가 글 내용을 그려 넣는 자리 -->
</div>

<script>
const id = new URLSearchParams(location.search).get('id');
let me = null;   // 로그인 정보 (댓글 작성/삭제 버튼 노출 여부에 씀)

// 삭제 버튼: 한 번 더 물어보고 DELETE 요청 → 성공하면 목록으로
async function deletePost() {
    if (!confirm('이 글을 삭제할까요?')) return;
    try {
        await api('/api/posts/' + id, { method: 'DELETE' });
        location.href = '/board.html';
    } catch (err) {
        alert(err.message);
    }
}

// ---------------- 좋아요 ----------------

// 버튼 클릭 → 토글 API 호출 → 응답의 새 상태로 버튼 모양/숫자를 즉시 갱신
async function toggleLike() {
    try {
        const result = await api('/api/posts/' + id + '/like', { method: 'POST' });
        renderLikeButton(result.liked, result.likeCount);
    } catch (err) {
        if (err.status === 401) { location.href = '/login.html'; return; }
        alert(err.message);
    }
}

function renderLikeButton(liked, likeCount) {
    const btn = document.getElementById('likeBtn');
    btn.textContent = (liked ? '♥' : '♡') + ' 좋아요 ' + likeCount;
    btn.classList.toggle('liked', liked);
}

// ---------------- 댓글 ----------------

async function loadComments() {
    const comments = await api('/api/posts/' + id + '/comments');
    const box = document.getElementById('commentList');

    if (comments.length === 0) {
        box.innerHTML = '<p class="empty" style="padding:24px 0;">아직 댓글이 없어요.</p>';
        return;
    }

    box.innerHTML = comments.map(c => `
        <div class="comment-item" id="comment-${c.id}">
            <div class="comment-top">
                <span class="comment-author">${esc(c.author)}</span>
                <span class="comment-date">${fmtDate(c.createdAt)}</span>
                ${me && me.username === c.author
                    ? `<button class="btn-del" onclick="deleteComment(${c.id})">삭제</button>`
                    : ''}
            </div>
            <p class="comment-content">${esc(c.content)}</p>
        </div>`).join('');
}

async function deleteComment(commentId) {
    if (!confirm('이 댓글을 삭제할까요?')) return;
    try {
        await api('/api/comments/' + commentId, { method: 'DELETE' });
        loadComments();
    } catch (err) {
        alert(err.message);
    }
}

document.addEventListener('submit', async (e) => {
    if (e.target.id !== 'commentForm') return;
    e.preventDefault();

    const textarea = e.target.content;
    try {
        await api('/api/posts/' + id + '/comments', { method: 'POST', body: { content: textarea.value } });
        textarea.value = '';
        loadComments();
    } catch (err) {
        if (err.status === 401) { location.href = '/login.html'; return; }
        alert(err.message);
    }
});

(async () => {
    const box = document.getElementById('post');

    try {
        // 글 내용과 내 로그인 정보를 동시에 요청 (로그인 안 해도 글은 볼 수 있음)
        const [post, loginUser] = await Promise.all([api('/api/posts/' + id), currentUser()]);
        me = loginUser;
        document.title = post.title;

        // 내가 쓴 글일 때만 수정/삭제 버튼 노출
        const mine = me && me.username === post.author;
        box.innerHTML = `
            <div class="toolbar">
                <div>
                    <h2 class="post-title">${esc(post.title)}</h2>
                    <p class="post-meta" style="margin-bottom:0;">${esc(post.author)} · ${fmtDate(post.createdAt)} · 조회 ${post.viewCount}</p>
                </div>
                ${mine ? `
                <div style="display:flex; gap:8px; flex:none;">
                    <a class="btn btn-ghost" href="/board-write.html?id=${post.id}">수정</a>
                    <button class="btn-del" onclick="deletePost()">삭제</button>
                </div>` : ''}
            </div>
            <div class="post-content">${esc(post.content)}</div>

            <div class="like-bar">
                <button class="btn-like" id="likeBtn" onclick="toggleLike()"></button>
            </div>

            <div class="comment-section">
                <h3>댓글</h3>
                <div id="commentList"></div>
                ${me
                    ? `<form class="add-form" id="commentForm">
                        <textarea name="content" placeholder="댓글을 입력하세요" required style="min-height:70px;"></textarea>
                        <button type="submit">댓글 작성</button>
                       </form>`
                    : `<p class="empty" style="padding:16px 0;"><a href="/login.html">로그인</a> 후 댓글을 남길 수 있어요.</p>`}
            </div>

            <a class="back" href="/board.html">← 목록으로</a>`;

        renderLikeButton(post.likedByMe, post.likeCount);   // 처음 화면에 좋아요 상태 표시
        await loadComments();
    } catch (err) {
        box.innerHTML = `
            <p class="empty">${esc(err.message)}</p>
            <a class="back" href="/board.html">← 목록으로</a>`;
    }
})();
</script>
</body>
</html>
